<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUMSS Image Gallery</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
color:#0a2c5a;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
background:rgba(0,70,150,0.7);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
color:white;
font-size:22px;
font-weight:bold;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
padding:8px 12px;
}

.nav-links a:hover{
background:white;
color:#0046a0;
border-radius:5px;
}

/* TITLE */

.title{
text-align:center;
padding:40px;
}

.title h1{
color:#0046a0;
}

/* GALLERY GRID */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border:3px solid #0046a0;
border-radius:8px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

 /* Base Button Styling */
    .btn {
        text-decoration: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        font-family: sans-serif;
        transition: all 0.3s ease;
        display: inline-block;
    }

    /* Solid Blue Button */
    .btn-solid {
        background-color: #2563eb; /* Vibrant Blue */
        color: #ffffff;
        border: 2px solid #2563eb;
    }

    .btn-solid:hover {
        background-color: #1d4ed8;
        transform: translateY(-2px);
    }

    /* Blue Outline Button */
    .btn-outline {
        background-color: #ffffff;
        color: #2563eb;
        border: 2px solid #2563eb;
    }

    .btn-outline:hover {
        background-color: #eff6ff;
    }
</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
IMAGE GALLERY
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="abouthumss.html">About HUMSS</a>
<a href="videogallery.html">Video Gallery</a>
<a href="game.html">Game</a>
</div>

</div>

<!-- TITLE -->

<div class="title">
<h1>HUMSS Image Gallery</h1>
<p>Photos related to HUMSS activities and learning</p>
<a href="videogallery.html" class="btn btn-solid">Video Gallery</a>
</div>

<!-- GALLERY -->

<div class="gallery">

<img src="VBALL.jpg">
<img src="HUMSSCHAMP.jpg">
<img src="HUMSSCHEER.jpg">
<img src="HUMANISTA.jpg">
<img src="HUMSSCHEER2.jpg">
<img src="PANAGBENGA.jpg">
<img src="FESTIV.jpg">

</div>

</body>
</html>
